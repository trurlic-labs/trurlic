name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: "1.95"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --locked --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: "1.95"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo test --workspace --locked

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: cargo deny
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2

      - name: cargo audit
        uses: actions-rust-lang/audit@72c09e02f132669d52284a3323acdb503cfc1a24 # v1

      # Reject any dependency published in the last 7 days. Protects
      # against supply-chain attacks that push malicious crate versions
      # and hope for fast adoption before detection.
      - name: Cargo dependency freshness check
        run: |
          set -euo pipefail
          MIN_AGE_DAYS=7
          NOW=$(date +%s)
          FAIL_FILE=$(mktemp)
          echo 0 > "$FAIL_FILE"

          # Extract name+version pairs from Cargo.lock
          while read -r name version; do

            # Skip path/git deps (workspace crates)
            grep -qP "^source = \"(path|git)" <<< \
              "$(awk -v n="$name" -v v="$version" '
                /^\[\[package\]\]/{found=0}
                /^name = "'"$name"'"/{n_ok=1}
                /^version = "'"$version"'"/{v_ok=1}
                /^source = /{if(n_ok&&v_ok) print; n_ok=0; v_ok=0}
              ' Cargo.lock 2>/dev/null)" 2>/dev/null && continue || true

            # Query crates.io for publish date of this exact version.
            # Download to file first — piping curl to python3 triggers the
            # scorecard downloadThenRun check.
            _tmp=$(mktemp)
            curl -sf "https://crates.io/api/v1/crates/${name}/${version}" \
              -H "User-Agent: trurlic-ci (supply-chain-check)" \
              -o "$_tmp" || { rm -f "$_tmp"; continue; }
            PUBLISHED=$(python3 -c "import json; print(json.load(open('$_tmp'))['version']['created_at'])" 2>/dev/null) || { rm -f "$_tmp"; continue; }
            rm -f "$_tmp"

            PUB_EPOCH=$(date -d "$PUBLISHED" +%s 2>/dev/null) || continue
            AGE_DAYS=$(( (NOW - PUB_EPOCH) / 86400 ))

            if [ "$AGE_DAYS" -lt "$MIN_AGE_DAYS" ]; then
              echo "::error::${name}@${version} published ${AGE_DAYS}d ago (minimum: ${MIN_AGE_DAYS}d)"
              echo 1 > "$FAIL_FILE"
            fi
          done < <(awk '/^name = /{name=$3} /^version = /{print name, $3}' Cargo.lock \
            | tr -d '"' | sort -u)

          FAIL=$(cat "$FAIL_FILE")
          rm -f "$FAIL_FILE"
          [ "$FAIL" -eq 0 ] || {
            echo ""
            echo "Crate(s) above were published less than ${MIN_AGE_DAYS} days ago."
            echo "Verify the release is legitimate before merging."
            exit 1
          }

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/map/frontend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/map/frontend/package-lock.json
      - run: npm ci
      - run: npm run fmt:check
      - run: npm run typecheck
      - run: npm test

      - name: CVE scan (cve-lite-cli)
        # TODO(2026-06-18): revert to --fail-on high and npm install esbuild@0.28.1
        # Suppressed: GHSA-gv7w-rqvm-qjhr (Deno-only RCE, N/A),
        # GHSA-g7r4-m6w7-qqqr (esbuild dev-server file read, N/A — build-time only, rust-embed).
        run: npx cve-lite-cli . --verbose --fail-on critical

      - name: Advisory check (npm audit)
        run: npm audit --omit=dev || true

      - name: Lockfile integrity
        run: |
          npx lockfile-lint \
            --path package-lock.json \
            --type npm \
            --allowed-hosts npm \
            --validate-https \
            --validate-package-names

      # Reject any dependency published in the last 7 days.
      - name: npm dependency freshness check
        run: |
          set -euo pipefail
          MIN_AGE_DAYS=7
          NOW=$(date +%s)
          FAIL_FILE=$(mktemp)
          echo 0 > "$FAIL_FILE"

          while read -r spec; do
            name="${spec%@*}"
            version="${spec##*@}"

            PUBLISHED=$(npm view "${name}@${version}" time --json 2>/dev/null \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('${version}',''))" 2>/dev/null) || continue
            [ -n "$PUBLISHED" ] || continue

            PUB_EPOCH=$(date -d "$PUBLISHED" +%s 2>/dev/null) || continue
            AGE_DAYS=$(( (NOW - PUB_EPOCH) / 86400 ))

            if [ "$AGE_DAYS" -lt "$MIN_AGE_DAYS" ]; then
              echo "::error::${name}@${version} published ${AGE_DAYS}d ago (minimum: ${MIN_AGE_DAYS}d)"
              echo 1 > "$FAIL_FILE"
            fi
          done < <(npm ls --json --all 2>/dev/null \
            | python3 -c "
          import sys, json
          def walk(deps, depth=0):
              if not deps: return
              for name, info in deps.items():
                  v = info.get('version','')
                  if v: print(f'{name}@{v}')
                  walk(info.get('dependencies',{}), depth+1)
          tree = json.load(sys.stdin)
          walk(tree.get('dependencies',{}))
          " | sort -u)

          FAIL=$(cat "$FAIL_FILE")
          rm -f "$FAIL_FILE"
          [ "$FAIL" -eq 0 ] || {
            echo "npm package(s) above were published < ${MIN_AGE_DAYS} days ago."
            exit 1
          }
