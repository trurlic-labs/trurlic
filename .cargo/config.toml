# Fast linker — optional speedup, not required to build.
#
# Linux: install lld (always available) or mold (faster, optional)
#   sudo apt install clang lld    # sufficient
#   sudo apt install mold         # optional, faster
#
#   To use mold, add to your personal ~/.cargo/config.toml:
#   [target.x86_64-unknown-linux-gnu]
#   linker = "clang"
#   rustflags = ["-C", "link-arg=-fuse-ld=mold"]

# ── Linux x86-64 ─────────────────────────────────────────────────────────────
[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=lld", "-C", "split-debuginfo=unpacked"]

# ── Linux aarch64 ────────────────────────────────────────────────────────────
[target.aarch64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=lld", "-C", "split-debuginfo=unpacked"]

# ── Windows MSVC ─────────────────────────────────────────────────────────────
[target.x86_64-pc-windows-msvc]
linker = "rust-lld"

[target.aarch64-pc-windows-msvc]
linker = "rust-lld"
