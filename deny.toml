[advisories]
# TODO(2026-07-13): remove this ignore and run `cargo update -p crossbeam-epoch`.
# RUSTSEC-2026-0204: invalid pointer deref in crossbeam-epoch's fmt::Debug/Display
# impls for Atomic/Shared. N/A — reached only transitively via rayon's work-stealing
# deque; trurlic never formats these types (rayon is used only for parallel file
# reads in store). Fix is >=0.9.20, published 2026-07-06 — held back by the 7-day
# freshness constraint until it clears quarantine on 2026-07-13.
ignore = ["RUSTSEC-2026-0204"]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
